name: Suggestion
description: New feature, improvement or change
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to share your idea.
        You can always contact me on Discord with any questions

  - type: textarea
    id: suggestion-text
    attributes:
      label: Suggestion
      description: Describe your suggestion.
      placeholder: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any screenshots, examples, references, or extra details.
      placeholder: Anything else can help!
    validations:
      required: false
